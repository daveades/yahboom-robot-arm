/**:
  ros__parameters:
    robot_description_kinematics:
      arm:
        kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
        kinematics_solver_search_resolution: 0.005
        kinematics_solver_timeout: 0.1
        position_only_ik: true
    planning_pipelines:
    - chomp
    - pilz_industrial_motion_planner
    - ompl
    default_planning_pipeline: ompl
    chomp:
      planning_plugin: chomp_interface/CHOMPPlanner
      enable_failure_recovery: true
      request_adapters: >-
        default_planner_request_adapters/AddTimeOptimalParameterization
        default_planner_request_adapters/ResolveConstraintFrames
        default_planner_request_adapters/FixWorkspaceBounds
        default_planner_request_adapters/FixStartStateBounds
        default_planner_request_adapters/FixStartStateCollision
        default_planner_request_adapters/FixStartStatePathConstraints
      start_state_max_bounds_error: 0.1
      ridge_factor: 0.01
    pilz_industrial_motion_planner:
      planning_plugin: pilz_industrial_motion_planner/CommandPlanner
      default_planner_config: PTP
      request_adapters: ''
      capabilities: pilz_industrial_motion_planner/MoveGroupSequenceAction pilz_industrial_motion_planner/MoveGroupSequenceService
    ompl:
      planning_plugin: ompl_interface/OMPLPlanner
      request_adapters: >-
        default_planner_request_adapters/AddTimeOptimalParameterization
        default_planner_request_adapters/ResolveConstraintFrames
        default_planner_request_adapters/FixWorkspaceBounds
        default_planner_request_adapters/FixStartStateBounds
        default_planner_request_adapters/FixStartStateCollision
        default_planner_request_adapters/FixStartStatePathConstraints
      start_state_max_bounds_error: 0.1
      planner_configs:
        AnytimePathShortening:
          type: geometric::AnytimePathShortening
          shortcut: 1
          hybridize: 1
          max_hybrid_paths: 24
          num_planners: 4
          planners: ''
        SBL:
          type: geometric::SBL
          range: 0.0
        EST:
          type: geometric::EST
          range: 0.0
          goal_bias: 0.05
        LBKPIECE:
          type: geometric::LBKPIECE
          range: 0.0
          border_fraction: 0.9
          min_valid_path_fraction: 0.5
        BKPIECE:
          type: geometric::BKPIECE
          range: 0.0
          border_fraction: 0.9
          failed_expansion_score_factor: 0.5
          min_valid_path_fraction: 0.5
        KPIECE:
          type: geometric::KPIECE
          range: 0.0
          goal_bias: 0.05
          border_fraction: 0.9
          failed_expansion_score_factor: 0.5
          min_valid_path_fraction: 0.5
        RRT:
          type: geometric::RRT
          range: 0.0
          goal_bias: 0.05
        RRTConnect:
          type: geometric::RRTConnect
          range: 0.0
        RRTstar:
          type: geometric::RRTstar
          range: 0.0
          goal_bias: 0.05
          delay_collision_checking: 1
        TRRT:
          type: geometric::TRRT
          range: 0.0
          goal_bias: 0.05
          max_states_failed: 10
          temp_change_factor: 2.0
          min_temperature: 10e-10
          init_temperature: 10e-6
          frountier_threshold: 0.0
          frountierNodeRatio: 0.1
          k_constant: 0.0
        PRM:
          type: geometric::PRM
          max_nearest_neighbors: 10
        PRMstar:
          type: geometric::PRMstar
        FMT:
          type: geometric::FMT
          num_samples: 1000
          radius_multiplier: 1.1
          nearest_k: 1
          cache_cc: 1
          heuristics: 0
          extended_fmt: 1
        BFMT:
          type: geometric::BFMT
          num_samples: 1000
          radius_multiplier: 1.0
          nearest_k: 1
          balanced: 0
          optimality: 1
          heuristics: 1
          cache_cc: 1
          extended_fmt: 1
        PDST:
          type: geometric::PDST
        STRIDE:
          type: geometric::STRIDE
          range: 0.0
          goal_bias: 0.05
          use_projected_distance: 0
          degree: 16
          max_degree: 18
          min_degree: 12
          max_pts_per_leaf: 6
          estimated_dimension: 0.0
          min_valid_path_fraction: 0.2
        BiTRRT:
          type: geometric::BiTRRT
          range: 0.0
          temp_change_factor: 0.1
          init_temperature: 100
          frountier_threshold: 0.0
          frountier_node_ratio: 0.1
          cost_threshold: 1e300
        LBTRRT:
          type: geometric::LBTRRT
          range: 0.0
          goal_bias: 0.05
          epsilon: 0.4
        BiEST:
          type: geometric::BiEST
          range: 0.0
        ProjEST:
          type: geometric::ProjEST
          range: 0.0
          goal_bias: 0.05
        LazyPRM:
          type: geometric::LazyPRM
          range: 0.0
        LazyPRMstar:
          type: geometric::LazyPRMstar
        SPARS:
          type: geometric::SPARS
          stretch_factor: 3.0
          sparse_delta_fraction: 0.25
          dense_delta_fraction: 0.001
          max_failures: 1000
        SPARStwo:
          type: geometric::SPARStwo
          stretch_factor: 3.0
          sparse_delta_fraction: 0.25
          dense_delta_fraction: 0.001
          max_failures: 5000
    moveit_manage_controllers: true
    moveit_simple_controller_manager:
      controller_names:
      - arm_controller
      - gripper_controller
      arm_controller:
        type: FollowJointTrajectory
        action_ns: follow_joint_trajectory
        default: true
        joints:
        - arm_joint1
        - arm_joint2
        - arm_joint3
        - arm_joint4
        - arm_joint5
      gripper_controller:
        type: FollowJointTrajectory
        action_ns: follow_joint_trajectory
        default: false
        joints:
        - grip_joint
    moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager
    publish_planning_scene: true
    publish_geometry_updates: true
    publish_state_updates: true
    publish_transforms_updates: true
    publish_robot_description: false
    publish_robot_description_semantic: false
    robot_description_planning:
      default_velocity_scaling_factor: 0.5
      default_acceleration_scaling_factor: 0.5
      joint_limits:
        arm_joint1:
          has_velocity_limits: true
          max_velocity: 1.0
          has_acceleration_limits: true
          max_acceleration: 1.0
        arm_joint2:
          has_velocity_limits: true
          max_velocity: 1.0
          has_acceleration_limits: true
          max_acceleration: 1.0
        arm_joint3:
          has_velocity_limits: true
          max_velocity: 1.0
          has_acceleration_limits: true
          max_acceleration: 1.0
        arm_joint4:
          has_velocity_limits: true
          max_velocity: 1.0
          has_acceleration_limits: true
          max_acceleration: 1.0
        arm_joint5:
          has_velocity_limits: true
          max_velocity: 1.0
          has_acceleration_limits: true
          max_acceleration: 1.0
        grip_joint:
          has_velocity_limits: true
          max_velocity: 1.0
          has_acceleration_limits: true
          max_acceleration: 1.0
      cartesian_limits:
        max_trans_vel: 1.0
        max_trans_acc: 2.25
        max_trans_dec: -5.0
        max_rot_vel: 1.57
