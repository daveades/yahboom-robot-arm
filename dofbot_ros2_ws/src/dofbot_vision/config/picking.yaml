pick_from_detections:
  ros__parameters:
    detections_topic: /detections
    joint_state_topic: /joint_states
    target_classes: ""
    min_confidence: 0.2

    # 3x3 homography matrix (row-major). Update using your calibration.
    homography:
      - 0.00018182
      - -0.00000000
      - 0.08181818
      - 0.00000000
      - 0.00028571
      - 0.02142857
      - 0.00000000
      - 0.00000000
      - 1.00000000

    base_frame: base_link
    group_name: arm
    ik_link: arm_link5
    arm_joints:
      - arm_joint1
      - arm_joint2
      - arm_joint3
      - arm_joint4
      - arm_joint5
    gripper_joint: grip_joint

    ik_service: /compute_ik
    ik_timeout: 1.0
    avoid_collisions: false
    arm_action: /arm_controller/follow_joint_trajectory
    gripper_action: /gripper_controller/follow_joint_trajectory

    approach_z: 0.12
    grasp_z: 0.12
    lift_z: 0.12

    # Adjust orientation to match your gripper "down" pose.
    pick_roll: 0.0
    pick_pitch: 0.0
    pick_yaw: 0.0

    # Tune these for your gripper.
    gripper_open: 0.0
    gripper_closed: -1.2

    move_time: 2.0
    gripper_time: 1.0
    cooldown: 5.0
    pick_once: true

    # Optional place target (set place_x/place_y to enable).
    place_x: .nan
    place_y: .nan
    place_z: 0.10
